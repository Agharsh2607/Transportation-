<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Fleet Tracking - 2000+ Buses</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      border-bottom: 1px solid #e0e6ed;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      margin-right: 40px;
      text-decoration: none;
    }

    .navbar-links {
      display: flex;
      gap: 30px;
      flex: 1;
    }

    .navbar-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #7f8c8d;
      transition: color 0.2s ease;
    }

    .navbar-link:hover {
      color: #667eea;
    }

    .navbar-link.active {
      color: #667eea;
      font-weight: 600;
      border-bottom: 2px solid #667eea;
      padding-bottom: 2px;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      margin-top: 60px;
    }

    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 400px;
      background: white;
      border-left: 1px solid #e0e6ed;
      display: flex;
      flex-direction: column;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.08);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0e6ed;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .controls {
      padding: 16px;
      border-bottom: 1px solid #e0e6ed;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #e0e6ed;
      color: #2c3e50;
    }

    .btn-secondary:hover {
      background: #d0d8e8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #f8f9fb;
      border: 1px solid #e0e6ed;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #2c3e50;
    }

    .stat-label {
      font-size: 11px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .city-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .city-item {
      background: #f8f9fb;
      border: 1px solid #e0e6ed;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .city-item:hover {
      background: #f0f3f8;
      border-color: #667eea;
    }

    .city-item.active {
      background: #eef2ff;
      border-color: #667eea;
    }

    .city-name {
      font-weight: 600;
      font-size: 14px;
      color: #2c3e50;
    }

    .city-stats {
      font-size: 12px;
      color: #7f8c8d;
      margin-top: 4px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #667eea;
      font-size: 13px;
      padding: 20px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e6ed;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 400;
      display: flex;
      flex-direction: column;
    }

    .map-control-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #667eea;
      transition: all 0.2s ease;
      border-bottom: 1px solid #e0e6ed;
    }

    .map-control-btn:last-child {
      border-bottom: none;
    }

    .map-control-btn:hover {
      background: #f8f9fb;
    }

    /* Custom cluster styles */
    .marker-cluster-small {
      background-color: rgba(102, 126, 234, 0.6);
    }
    .marker-cluster-small div {
      background-color: rgba(102, 126, 234, 0.8);
    }

    .marker-cluster-medium {
      background-color: rgba(102, 126, 234, 0.6);
    }
    .marker-cluster-medium div {
      background-color: rgba(102, 126, 234, 0.8);
    }

    .marker-cluster-large {
      background-color: rgba(102, 126, 234, 0.6);
    }
    .marker-cluster-large div {
      background-color: rgba(102, 126, 234, 0.8);
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">TransitPulse</a>
    <div class="navbar-links">
      <a href="index.html" class="navbar-link">Home</a>
      <a href="dashboard.html" class="navbar-link">Dashboard</a>
      <a href="live-map.html" class="navbar-link">Live Map</a>
      <a href="fleet-map.html" class="navbar-link active">Fleet Map</a>
      <a href="vehicle-detail.html" class="navbar-link">Vehicles</a>
      <a href="admin.html" class="navbar-link" id="admin-nav-link" style="display: none;">Admin</a>
    </div>
  </nav>

  <div class="container">
    <div class="map-container">
      <div id="map"></div>
      <div class="map-controls">
        <button class="map-control-btn" title="Zoom In" onclick="map.zoomIn()">+</button>
        <button class="map-control-btn" title="Zoom Out" onclick="map.zoomOut()">−</button>
        <button class="map-control-btn" title="Fit All" onclick="fitAllVehicles()">⊙</button>
        <button class="map-control-btn" title="Refresh" onclick="refreshVehicles()">↻</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <h2>India Fleet Tracking</h2>
        <p id="fleet-summary">Loading fleet data...</p>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="initializeFleet()">Initialize Fleet</button>
        <button class="btn btn-secondary" onclick="startFleet()">Start Simulation</button>
        <button class="btn btn-secondary" onclick="stopFleet()">Stop Simulation</button>
      </div>

      <div class="sidebar-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="total-vehicles">0</div>
            <div class="stat-label">Total Buses</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="live-vehicles">0</div>
            <div class="stat-label">Live</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="delayed-vehicles">0</div>
            <div class="stat-label">Delayed</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="offline-vehicles">0</div>
            <div class="stat-label">Offline</div>
          </div>
        </div>

        <h3 style="margin-bottom: 12px; font-size: 14px; color: #2c3e50;">Cities</h3>
        <div class="city-list" id="city-list">
          <div class="loading">
            <div class="spinner"></div>
            <span>Loading cities...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
  <script>
    // Global variables
    let map;
    let markerClusterGroup;
    let vehicleMarkers = new Map();
    let ws = null;
    let selectedCity = null;
    let updateInterval = null;
    let isFleetInitialized = false;
    let isSimulationRunning = false;

    const API_BASE = 'http://localhost:3000/api';
    const WS_URL = 'ws://localhost:3000';

    // Initialize map
    function initMap() {
      map = L.map('map').setView([20.5937, 78.9629], 5); // Center of India

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
      }).addTo(map);

      // Initialize marker cluster group
      markerClusterGroup = L.markerClusterGroup({
        chunkedLoading: true,
        chunkInterval: 200,
        chunkDelay: 50,
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true
      });
      
      map.addLayer(markerClusterGroup);
    }

    // Initialize fleet simulation
    async function initializeFleet() {
      try {
        showLoading('Initializing fleet...');
        
        const response = await fetch(`${API_BASE}/fleet/initialize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();
        
        if (data.success) {
          isFleetInitialized = true;
          updateFleetStats(data.stats);
          await loadCities();
          await loadVehicles();
          showSuccess('Fleet initialized successfully!');
        } else {
          showError('Failed to initialize fleet: ' + data.message);
        }
      } catch (error) {
        console.error('Error initializing fleet:', error);
        showError('Error initializing fleet: ' + error.message);
      }
    }

    // Start fleet simulation
    async function startFleet() {
      try {
        if (!isFleetInitialized) {
          showError('Please initialize fleet first');
          return;
        }

        const response = await fetch(`${API_BASE}/fleet/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();
        
        if (data.success) {
          isSimulationRunning = true;
          connectWebSocket();
          startPeriodicUpdates();
          showSuccess('Fleet simulation started!');
        } else {
          showError('Failed to start fleet: ' + data.message);
        }
      } catch (error) {
        console.error('Error starting fleet:', error);
        showError('Error starting fleet: ' + error.message);
      }
    }

    // Stop fleet simulation
    async function stopFleet() {
      try {
        const response = await fetch(`${API_BASE}/fleet/stop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();
        
        if (data.success) {
          isSimulationRunning = false;
          disconnectWebSocket();
          stopPeriodicUpdates();
          showSuccess('Fleet simulation stopped!');
        } else {
          showError('Failed to stop fleet: ' + data.message);
        }
      } catch (error) {
        console.error('Error stopping fleet:', error);
        showError('Error stopping fleet: ' + error.message);
      }
    }

    // Load cities
    async function loadCities() {
      try {
        const response = await fetch(`${API_BASE}/fleet/cities`);
        const data = await response.json();
        
        if (data.success) {
          displayCities(data.cities);
        }
      } catch (error) {
        console.error('Error loading cities:', error);
      }
    }

    // Display cities in sidebar
    function displayCities(cities) {
      const cityList = document.getElementById('city-list');
      cityList.innerHTML = '';

      cities.forEach(city => {
        const cityItem = document.createElement('div');
        cityItem.className = 'city-item';
        cityItem.onclick = () => selectCity(city.key);
        
        cityItem.innerHTML = `
          <div class="city-name">${city.name}</div>
          <div class="city-stats">${city.busCount} buses • ${(city.population / 1000000).toFixed(1)}M people</div>
        `;
        
        cityList.appendChild(cityItem);
      });
    }

    // Select city and zoom to it
    async function selectCity(cityKey) {
      try {
        // Update UI
        document.querySelectorAll('.city-item').forEach(item => {
          item.classList.remove('active');
        });
        event.target.closest('.city-item').classList.add('active');
        
        selectedCity = cityKey;
        
        // Load city vehicles
        const response = await fetch(`${API_BASE}/fleet/cities/${cityKey}/vehicles`);
        const data = await response.json();
        
        if (data.success) {
          // Clear existing markers
          markerClusterGroup.clearLayers();
          vehicleMarkers.clear();
          
          // Add city vehicles
          data.vehicles.forEach(vehicle => {
            addVehicleMarker(vehicle);
          });
          
          // Zoom to city bounds (you'd need to get this from the API)
          // For now, just zoom to first vehicle
          if (data.vehicles.length > 0) {
            const firstVehicle = data.vehicles[0];
            map.setView([firstVehicle.lat, firstVehicle.lng], 11);
          }
        }
      } catch (error) {
        console.error('Error selecting city:', error);
      }
    }

    // Load all vehicles
    async function loadVehicles() {
      try {
        const response = await fetch(`${API_BASE}/fleet/vehicles`);
        const data = await response.json();
        
        if (data.success) {
          // Clear existing markers
          markerClusterGroup.clearLayers();
          vehicleMarkers.clear();
          
          // Add all vehicles
          data.vehicles.forEach(vehicle => {
            addVehicleMarker(vehicle);
          });
          
          updateVehicleStats(data.vehicles);
        }
      } catch (error) {
        console.error('Error loading vehicles:', error);
      }
    }

    // Add vehicle marker to map
    function addVehicleMarker(vehicle) {
      const lat = parseFloat(vehicle.lat);
      const lng = parseFloat(vehicle.lng);
      
      if (isNaN(lat) || isNaN(lng)) return;

      const icon = createVehicleIcon(vehicle.status, vehicle.heading || 0);
      const marker = L.marker([lat, lng], { icon })
        .bindPopup(`
          <strong>${vehicle.bus_number}</strong><br/>
          Route: ${vehicle.route_id}<br/>
          Status: ${vehicle.status}<br/>
          Speed: ${(vehicle.speed || 0).toFixed(1)} km/h<br/>
          Driver: ${vehicle.driver_name || 'N/A'}<br/>
          Last Update: ${formatTime(vehicle.last_updated)}
        `);

      markerClusterGroup.addLayer(marker);
      vehicleMarkers.set(vehicle.vehicle_id, marker);
    }

    // Create vehicle icon
    function createVehicleIcon(status, heading) {
      const colors = {
        live: '#27ae60',
        delayed: '#f39c12', 
        offline: '#e74c3c'
      };
      
      const color = colors[status] || '#95a5a6';
      
      const svg = `
        <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <g transform="rotate(${heading} 12 12)">
            <path d="M12 2 L20 20 L12 16 L4 20 Z" fill="${color}" stroke="white" stroke-width="1"/>
          </g>
        </svg>
      `;

      return L.icon({
        iconUrl: 'data:image/svg+xml;base64,' + btoa(svg),
        iconSize: [24, 24],
        iconAnchor: [12, 12],
      });
    }

    // Update vehicle statistics
    function updateVehicleStats(vehicles) {
      const stats = {
        total: vehicles.length,
        live: 0,
        delayed: 0,
        offline: 0
      };

      vehicles.forEach(vehicle => {
        stats[vehicle.status]++;
      });

      document.getElementById('total-vehicles').textContent = stats.total;
      document.getElementById('live-vehicles').textContent = stats.live;
      document.getElementById('delayed-vehicles').textContent = stats.delayed;
      document.getElementById('offline-vehicles').textContent = stats.offline;
    }

    // Update fleet statistics
    function updateFleetStats(stats) {
      if (stats.statusBreakdown) {
        document.getElementById('total-vehicles').textContent = stats.totalVehicles;
        document.getElementById('live-vehicles').textContent = stats.statusBreakdown.live;
        document.getElementById('delayed-vehicles').textContent = stats.statusBreakdown.delayed;
        document.getElementById('offline-vehicles').textContent = stats.statusBreakdown.offline;
      }
      
      document.getElementById('fleet-summary').textContent = 
        `${stats.totalVehicles} buses across ${stats.cities} cities`;
    }

    // Fit all vehicles in view
    function fitAllVehicles() {
      if (markerClusterGroup.getLayers().length > 0) {
        map.fitBounds(markerClusterGroup.getBounds(), { padding: [20, 20] });
      }
    }

    // Refresh vehicles
    function refreshVehicles() {
      if (selectedCity) {
        selectCity(selectedCity);
      } else {
        loadVehicles();
      }
    }

    // Connect to WebSocket for real-time updates
    function connectWebSocket() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('WebSocket connected for fleet updates');
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'vehicle_update' && data.vehicle) {
            updateVehicleMarker(data.vehicle);
          }
        } catch (err) {
          console.error('WebSocket message error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected');
        if (isSimulationRunning) {
          setTimeout(connectWebSocket, 3000);
        }
      };
    }

    // Disconnect WebSocket
    function disconnectWebSocket() {
      if (ws) {
        ws.close();
        ws = null;
      }
    }

    // Update vehicle marker from WebSocket
    function updateVehicleMarker(vehicle) {
      const marker = vehicleMarkers.get(vehicle.vehicle_id);
      if (marker) {
        const lat = parseFloat(vehicle.lat);
        const lng = parseFloat(vehicle.lng);
        
        if (!isNaN(lat) && !isNaN(lng)) {
          marker.setLatLng([lat, lng]);
          marker.setIcon(createVehicleIcon(vehicle.status, vehicle.heading || 0));
        }
      }
    }

    // Start periodic updates
    function startPeriodicUpdates() {
      updateInterval = setInterval(() => {
        if (selectedCity) {
          selectCity(selectedCity);
        } else {
          loadVehicles();
        }
      }, 10000); // Update every 10 seconds
    }

    // Stop periodic updates
    function stopPeriodicUpdates() {
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }
    }

    // Utility functions
    function formatTime(timestamp) {
      if (!timestamp) return 'N/A';
      return new Date(timestamp).toLocaleTimeString();
    }

    function showLoading(message) {
      document.getElementById('fleet-summary').textContent = message;
    }

    function showSuccess(message) {
      document.getElementById('fleet-summary').textContent = message;
      setTimeout(() => {
        if (isFleetInitialized) {
          document.getElementById('fleet-summary').textContent = 
            `Fleet simulation ${isSimulationRunning ? 'running' : 'ready'}`;
        }
      }, 3000);
    }

    function showError(message) {
      document.getElementById('fleet-summary').textContent = message;
      console.error(message);
    }

    // Check admin access and show admin link
    async function checkAdminAccess() {
      try {
        const response = await fetch('http://localhost:3000/api/admin/check-auth', {
          method: 'GET',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
          const data = await response.json();
          if (data.success && data.authenticated) {
            const adminLink = document.getElementById('admin-nav-link');
            if (adminLink) {
              adminLink.style.display = 'inline';
            }
          }
        }
      } catch (error) {
        console.debug('Admin access check failed:', error);
      }
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      initMap();
      loadCities();
      checkAdminAccess();
    });
  </script>
</body>
</html>
