<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Transport Tracking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      border-bottom: 1px solid #e0e6ed;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      margin-right: 40px;
      text-decoration: none;
    }

    .navbar-links {
      display: flex;
      gap: 30px;
      flex: 1;
    }

    .navbar-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #7f8c8d;
      transition: color 0.2s ease;
    }

    .navbar-link:hover {
      color: #667eea;
    }

    .navbar-link.active {
      color: #667eea;
      font-weight: 600;
      border-bottom: 2px solid #667eea;
      padding-bottom: 2px;
    }

    .navbar-actions {
      display: flex;
      gap: 12px;
      margin-left: auto;
    }

    .navbar-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .navbar-btn-secondary {
      background: #e0e6ed;
      color: #2c3e50;
    }

    .navbar-btn-secondary:hover {
      background: #d0d8e8;
    }

    .navbar-btn-primary {
      background: #667eea;
      color: white;
    }

    .navbar-btn-primary:hover {
      background: #5568d3;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      gap: 0;
      margin-top: 60px;
    }

    .map-container {
      flex: 1;
      position: relative;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 380px;
      background: #fff;
      border-left: 1px solid #e0e6ed;
      display: flex;
      flex-direction: column;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.08);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0e6ed;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .sidebar-header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .vehicle-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .vehicle-card {
      background: #f8f9fb;
      border: 1px solid #e0e6ed;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .vehicle-card:hover {
      background: #f0f3f8;
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .vehicle-card.active {
      background: #eef2ff;
      border-color: #667eea;
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
    }

    .vehicle-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .vehicle-name {
      font-weight: 600;
      font-size: 14px;
      color: #2c3e50;
    }

    .vehicle-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-online {
      background: #d4edda;
      color: #155724;
    }

    .status-delayed {
      background: #fff3cd;
      color: #856404;
    }

    .status-offline {
      background: #f8d7da;
      color: #721c24;
    }

    .vehicle-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 12px;
      margin-top: 8px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-label {
      color: #7f8c8d;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      color: #2c3e50;
      font-weight: 600;
      font-size: 13px;
    }

    .vehicle-details {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e0e6ed;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .detail-label {
      color: #7f8c8d;
    }

    .detail-value {
      color: #2c3e50;
      font-weight: 600;
    }

    .next-stops {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e0e6ed;
    }

    .next-stops-title {
      font-size: 11px;
      font-weight: 600;
      color: #7f8c8d;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stop-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .stop-number {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
    }

    .stop-info {
      flex: 1;
    }

    .stop-name {
      color: #2c3e50;
      font-weight: 500;
    }

    .stop-eta {
      color: #7f8c8d;
      font-size: 11px;
    }

    .controls {
      padding: 16px;
      border-top: 1px solid #e0e6ed;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #e0e6ed;
      color: #2c3e50;
    }

    .btn-secondary:hover {
      background: #d0d8e8;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #7f8c8d;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-text {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #667eea;
      font-size: 13px;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #e0e6ed;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 400;
    }

    .map-control-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #667eea;
      transition: all 0.2s ease;
      border-bottom: 1px solid #e0e6ed;
    }

    .map-control-btn:last-child {
      border-bottom: none;
    }

    .map-control-btn:hover {
      background: #f8f9fb;
    }

    .status-bar {
      padding: 12px 16px;
      background: #f8f9fb;
      border-bottom: 1px solid #e0e6ed;
      font-size: 12px;
      color: #7f8c8d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #27ae60;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .last-update {
      font-size: 11px;
      color: #95a5a6;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40%;
        border-left: none;
        border-top: 1px solid #e0e6ed;
      }

      .map-container {
        height: 60%;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">TransitPulse</a>
    <div class="navbar-links">
      <a href="index.html" class="navbar-link">Home</a>
      <a href="dashboard.html" class="navbar-link">Dashboard</a>
      <a href="live-map.html" class="navbar-link active">Live Map</a>
      <a href="fleet-map.html" class="navbar-link">Fleet Map</a>
      <a href="vehicle-detail.html" class="navbar-link">Vehicles</a>
      <a href="admin.html" class="navbar-link" id="admin-nav-link" style="display: none;">Admin</a>
    </div>
    <div class="navbar-actions">
      <a href="auth.html" class="navbar-btn navbar-btn-secondary">Sign In</a>
    </div>
  </nav>

  <div class="container">
    <div class="map-container">
      <div id="map"></div>
      <div class="map-controls">
        <button class="map-control-btn" title="Zoom In" onclick="map.zoomIn()">+</button>
        <button class="map-control-btn" title="Zoom Out" onclick="map.zoomOut()">−</button>
        <button class="map-control-btn" title="Center Map" onclick="centerMap()">⊙</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Live Vehicles</h2>
        <p id="vehicle-count">Loading...</p>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Live Updates</span>
        </div>
        <div class="last-update" id="last-update">Just now</div>
      </div>

      <div class="sidebar-content">
        <div id="vehicle-list" class="vehicle-list">
          <div class="empty-state">
            <div class="empty-state-icon">🚌</div>
            <div class="empty-state-text">No vehicles tracking</div>
            <div class="loading">
              <div class="spinner"></div>
              <span>Initializing...</span>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="startTracking()">Start Tracking</button>
        <button class="btn btn-secondary" onclick="stopTracking()">Stop</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // Map initialization
    let map;
    let vehicleMarkers = new Map();
    let selectedVehicleId = null;
    let ws = null;
    let trackingInterval = null;
    let lastUpdateTime = Date.now();
    let isTracking = false;
    let watchId = null;

    const API_BASE = 'http://localhost:3000/api';
    const WS_URL = 'ws://localhost:3000';

    // Initialize map
    function initMap() {
      map = L.map('map').setView([40.7580, -73.9855], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
      }).addTo(map);
    }

    // Center map on all vehicles
    function centerMap() {
      if (vehicleMarkers.size === 0) {
        map.setView([40.7580, -73.9855], 12);
        return;
      }

      if (vehicleMarkers.size === 1) {
        const marker = Array.from(vehicleMarkers.values())[0];
        map.setView(marker.getLatLng(), 15);
      } else {
        const group = new L.featureGroup(Array.from(vehicleMarkers.values()));
        map.fitBounds(group.getBounds(), { padding: [50, 50] });
      }
    }

    // Connect to WebSocket for real-time updates
    function connectWebSocket() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        return;
      }

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('WebSocket connected');
        updateConnectionStatus(true);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('WebSocket message received:', data);

          if (data.type === 'vehicle_update' && data.vehicle) {
            updateVehicleOnMap(data.vehicle);
            updateVehicleInList(data.vehicle);
            lastUpdateTime = Date.now();
            updateLastUpdateTime();
          }
        } catch (err) {
          console.error('WebSocket message error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        updateConnectionStatus(false);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected');
        updateConnectionStatus(false);
        // Reconnect after 3 seconds
        setTimeout(connectWebSocket, 3000);
      };
    }

    // Update connection status indicator
    function updateConnectionStatus(connected) {
      const statusDot = document.querySelector('.status-dot');
      const statusText = document.querySelector('.status-indicator span');
      
      if (connected) {
        statusDot.style.background = '#27ae60';
        statusText.textContent = 'Live Updates';
      } else {
        statusDot.style.background = '#e74c3c';
        statusText.textContent = 'Disconnected';
      }
    }

    // Load and display existing vehicles
    async function loadActiveVehicles() {
      try {
        console.log('Loading active vehicles...');
        const response = await fetch(`${API_BASE}/live/vehicles`);
        const data = await response.json();

        console.log('Active vehicles response:', data);

        if (data.success && data.vehicles) {
          // Clear existing vehicles
          clearVehicleList();
          vehicleMarkers.clear();

          if (data.vehicles.length === 0) {
            showEmptyState();
            return;
          }

          // Add each vehicle
          for (const vehicle of data.vehicles) {
            updateVehicleOnMap(vehicle);
            updateVehicleInList(vehicle);
          }

          // Center map on vehicles
          centerMap();
          updateVehicleCount();
        } else {
          console.error('Failed to load vehicles:', data);
          showEmptyState();
        }
      } catch (err) {
        console.error('Error loading active vehicles:', err);
        showEmptyState();
      }
    }

    // Clear vehicle list
    function clearVehicleList() {
      const vehicleList = document.getElementById('vehicle-list');
      vehicleList.innerHTML = '';
    }

    // Show empty state
    function showEmptyState() {
      const vehicleList = document.getElementById('vehicle-list');
      vehicleList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🚌</div>
          <div class="empty-state-text">No active vehicles</div>
          <div style="font-size: 12px; color: #95a5a6; margin-top: 8px;">
            Click "Start Tracking" to begin GPS tracking
          </div>
        </div>
      `;
      updateVehicleCount();
    }

    // Update vehicle marker on map
    function updateVehicleOnMap(vehicle) {
      const key = vehicle.vehicle_id;
      const lat = parseFloat(vehicle.lat);
      const lng = parseFloat(vehicle.lng);

      // Validate coordinates
      if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) {
        console.warn('Invalid coordinates for vehicle:', vehicle);
        return;
      }

      if (!vehicleMarkers.has(key)) {
        // Create new marker
        const marker = L.marker([lat, lng], {
          icon: createVehicleIcon(vehicle.heading || 0, vehicle.status),
        })
          .bindPopup(
            `<strong>${vehicle.bus_number || vehicle.vehicle_id}</strong><br/>
           Speed: ${(vehicle.speed || 0).toFixed(1)} km/h<br/>
           Status: ${vehicle.status}<br/>
           Last Update: ${formatTime(vehicle.last_updated)}`
          )
          .addTo(map);

        vehicleMarkers.set(key, marker);
        console.log('Created marker for vehicle:', key, 'at', lat, lng);
      } else {
        // Update existing marker
        const marker = vehicleMarkers.get(key);
        marker.setLatLng([lat, lng]);
        marker.setIcon(createVehicleIcon(vehicle.heading || 0, vehicle.status));
        
        // Update popup content
        marker.setPopupContent(
          `<strong>${vehicle.bus_number || vehicle.vehicle_id}</strong><br/>
         Speed: ${(vehicle.speed || 0).toFixed(1)} km/h<br/>
         Status: ${vehicle.status}<br/>
         Last Update: ${formatTime(vehicle.last_updated)}`
        );
        
        console.log('Updated marker for vehicle:', key, 'at', lat, lng);
      }
    }

    // Create vehicle icon with heading and status
    function createVehicleIcon(heading, status) {
      const color = status === 'live' ? '#27ae60' : status === 'delayed' ? '#f39c12' : '#e74c3c';
      
      const svg = `
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <g transform="rotate(${heading || 0} 16 16)">
            <path d="M16 4 L26 26 L16 22 L6 26 Z" fill="${color}" stroke="white" stroke-width="2"/>
          </g>
        </svg>
      `;

      return L.icon({
        iconUrl: 'data:image/svg+xml;base64,' + btoa(svg),
        iconSize: [32, 32],
        iconAnchor: [16, 16],
      });
    }

    // Update vehicle in sidebar list
    function updateVehicleInList(vehicle) {
      let card = document.querySelector(`[data-vehicle-id="${vehicle.vehicle_id}"]`);

      if (!card) {
        // Remove empty state if it exists
        const emptyState = document.querySelector('.empty-state');
        if (emptyState) {
          emptyState.remove();
        }

        card = createVehicleCard(vehicle);
        document.getElementById('vehicle-list').appendChild(card);
      }

      // Update card content
      const statusElement = card.querySelector('.vehicle-status');
      statusElement.textContent = vehicle.status || 'Unknown';
      statusElement.className = `vehicle-status ${getStatusClass(vehicle.status)}`;

      const speedValue = card.querySelector('[data-field="speed"]');
      if (speedValue) speedValue.textContent = (vehicle.speed || 0).toFixed(1) + ' km/h';

      const lastUpdateValue = card.querySelector('[data-field="last-update"]');
      if (lastUpdateValue) lastUpdateValue.textContent = formatTime(vehicle.last_updated);

      updateVehicleCount();
    }

    // Get status CSS class
    function getStatusClass(status) {
      switch (status) {
        case 'live': return 'status-online';
        case 'delayed': return 'status-delayed';
        case 'offline': return 'status-offline';
        default: return 'status-offline';
      }
    }

    // Create vehicle card
    function createVehicleCard(vehicle) {
      const card = document.createElement('div');
      card.className = 'vehicle-card';
      card.setAttribute('data-vehicle-id', vehicle.vehicle_id);
      card.onclick = () => selectVehicle(vehicle.vehicle_id);

      card.innerHTML = `
        <div class="vehicle-header">
          <div class="vehicle-name">${vehicle.bus_number || vehicle.vehicle_id}</div>
          <div class="vehicle-status ${getStatusClass(vehicle.status)}">${vehicle.status || 'Unknown'}</div>
        </div>
        <div class="vehicle-info">
          <div class="info-item">
            <div class="info-label">Speed</div>
            <div class="info-value" data-field="speed">${(vehicle.speed || 0).toFixed(1)} km/h</div>
          </div>
          <div class="info-item">
            <div class="info-label">Last Update</div>
            <div class="info-value" data-field="last-update">${formatTime(vehicle.last_updated)}</div>
          </div>
        </div>
        <div class="vehicle-details">
          <div class="detail-row">
            <span class="detail-label">Vehicle ID</span>
            <span class="detail-value">${vehicle.vehicle_id}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Route</span>
            <span class="detail-value">${vehicle.route_id || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Driver</span>
            <span class="detail-value">${vehicle.driver_name || 'N/A'}</span>
          </div>
        </div>
      `;

      return card;
    }

    // Select vehicle
    function selectVehicle(vehicleId) {
      document.querySelectorAll('.vehicle-card').forEach((card) => {
        card.classList.remove('active');
      });

      const card = document.querySelector(`[data-vehicle-id="${vehicleId}"]`);
      if (card) card.classList.add('active');

      selectedVehicleId = vehicleId;
      const marker = vehicleMarkers.get(vehicleId);
      if (marker) {
        map.setView(marker.getLatLng(), 15);
      }
    }

    // Start tracking with real GPS
    async function startTracking() {
      if (isTracking) {
        alert('Tracking is already active');
        return;
      }

      // Check geolocation support
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by this browser');
        return;
      }

      try {
        // Request permission and get initial position
        const position = await getCurrentPosition();
        console.log('Initial position:', position);

        // Generate vehicle ID and bus number
        const vehicleId = 'BUS-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        const busNumber = 'B' + Math.floor(Math.random() * 900 + 100);

        // Send initial position
        await sendGPSUpdate(vehicleId, busNumber, position);

        // Start continuous tracking
        watchId = navigator.geolocation.watchPosition(
          (pos) => sendGPSUpdate(vehicleId, busNumber, pos),
          (error) => {
            console.error('GPS tracking error:', error);
            handleGPSError(error);
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 5000
          }
        );

        isTracking = true;
        updateTrackingButton();
        alert(`Tracking started for ${busNumber} (${vehicleId})`);

      } catch (error) {
        console.error('Error starting tracking:', error);
        handleGPSError(error);
      }
    }

    // Get current position as Promise
    function getCurrentPosition() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 5000
        });
      });
    }

    // Send GPS update to server
    async function sendGPSUpdate(vehicleId, busNumber, position) {
      try {
        const { latitude, longitude, speed, heading } = position.coords;
        
        console.log('Sending GPS update:', {
          vehicleId,
          busNumber,
          lat: latitude,
          lng: longitude,
          speed: speed || 0,
          heading: heading || 0
        });

        const response = await fetch(`${API_BASE}/live/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            vehicle_id: vehicleId,
            bus_number: busNumber,
            lat: latitude,
            lng: longitude,
            speed: (speed || 0) * 3.6, // Convert m/s to km/h
            heading: heading || 0,
            accuracy: position.coords.accuracy,
            driver_name: 'Live Driver',
            route_id: 'LIVE-ROUTE'
          }),
        });

        const data = await response.json();
        
        if (data.success) {
          console.log('GPS update sent successfully:', data);
          lastUpdateTime = Date.now();
          updateLastUpdateTime();
        } else {
          console.error('Failed to send GPS update:', data);
        }
      } catch (error) {
        console.error('Error sending GPS update:', error);
      }
    }

    // Handle GPS errors
    function handleGPSError(error) {
      let message = 'GPS tracking error: ';
      
      switch (error.code) {
        case error.PERMISSION_DENIED:
          message += 'Location permission denied. Please enable location access.';
          break;
        case error.POSITION_UNAVAILABLE:
          message += 'Location information unavailable.';
          break;
        case error.TIMEOUT:
          message += 'Location request timed out.';
          break;
        default:
          message += 'Unknown error occurred.';
          break;
      }
      
      alert(message);
    }

    // Stop tracking
    async function stopTracking() {
      if (!isTracking) {
        alert('No active tracking to stop');
        return;
      }

      // Stop GPS watching
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      isTracking = false;
      updateTrackingButton();
      alert('Tracking stopped');
    }

    // Update tracking button state
    function updateTrackingButton() {
      const startBtn = document.querySelector('.btn-primary');
      const stopBtn = document.querySelector('.btn-secondary');
      
      if (isTracking) {
        startBtn.textContent = 'Tracking Active';
        startBtn.disabled = true;
        startBtn.style.opacity = '0.6';
        stopBtn.disabled = false;
        stopBtn.style.opacity = '1';
      } else {
        startBtn.textContent = 'Start Tracking';
        startBtn.disabled = false;
        startBtn.style.opacity = '1';
        stopBtn.disabled = false;
        stopBtn.style.opacity = '1';
      }
    }

    // Format time
    function formatTime(timestamp) {
      if (!timestamp) return 'N/A';
      
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      
      if (diff < 10) return 'Just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      
      return date.toLocaleTimeString();
    }

    // Update vehicle count
    function updateVehicleCount() {
      const count = document.querySelectorAll('.vehicle-card').length;
      document.getElementById('vehicle-count').textContent = `${count} vehicle${count !== 1 ? 's' : ''} tracking`;
    }

    // Update last update time
    function updateLastUpdateTime() {
      const now = Date.now();
      const diff = Math.floor((now - lastUpdateTime) / 1000);

      if (diff < 5) {
        document.getElementById('last-update').textContent = 'Just now';
      } else if (diff < 60) {
        document.getElementById('last-update').textContent = diff + 's ago';
      } else {
        document.getElementById('last-update').textContent = Math.floor(diff / 60) + 'm ago';
      }
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      console.log('Initializing Live Map...');
      initMap();
      connectWebSocket();
      loadActiveVehicles();
      updateTrackingButton();

      // Update last update time every second
      setInterval(updateLastUpdateTime, 1000);
      
      // Refresh vehicle list every 30 seconds
      setInterval(loadActiveVehicles, 30000);
    });
  </script>
  <script>
    // Check if user has admin access and show admin link
    async function checkAdminAccess() {
      try {
        const response = await fetch('http://localhost:3000/api/admin/check-auth', {
          method: 'GET',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const data = await response.json();
          if (data.success && data.authenticated) {
            // Show admin link
            const adminLink = document.getElementById('admin-nav-link');
            if (adminLink) {
              adminLink.style.display = 'inline';
            }
          }
        }
      } catch (error) {
        // Silently fail - admin link stays hidden
        console.debug('Admin access check failed:', error);
      }
    }

    // Check admin access on page load
    document.addEventListener('DOMContentLoaded', checkAdminAccess);
  </script>
