<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Bus Tracking - TransitPulse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #2c3e50;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      border-bottom: 1px solid #e0e6ed;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 500;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .navbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
      margin-right: 40px;
      text-decoration: none;
    }

    .navbar-links {
      display: flex;
      gap: 30px;
      flex: 1;
    }

    .navbar-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #7f8c8d;
      transition: color 0.2s ease;
    }

    .navbar-link:hover {
      color: #667eea;
    }

    .navbar-link.active {
      color: #667eea;
      font-weight: 600;
      border-bottom: 2px solid #667eea;
      padding-bottom: 2px;
    }

    .navbar-actions {
      display: flex;
      gap: 12px;
      margin-left: auto;
    }

    .navbar-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .navbar-btn-primary {
      background: #667eea;
      color: white;
    }

    .navbar-btn-primary:hover {
      background: #5568d3;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
      margin-top: 60px;
      gap: 0;
    }

    .map-container {
      flex: 1;
      position: relative;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 380px;
      background: #fff;
      border-left: 1px solid #e0e6ed;
      display: flex;
      flex-direction: column;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.08);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e0e6ed;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .sidebar-header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .vehicle-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .vehicle-card {
      background: #f8f9fb;
      border: 1px solid #e0e6ed;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .vehicle-card:hover {
      background: #f0f3f8;
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .vehicle-card.active {
      background: #eef2ff;
      border-color: #667eea;
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
    }

    .vehicle-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .vehicle-name {
      font-weight: 600;
      font-size: 14px;
      color: #2c3e50;
    }

    .vehicle-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-live {
      background: #d4edda;
      color: #155724;
    }

    .status-delayed {
      background: #fff3cd;
      color: #856404;
    }

    .status-offline {
      background: #f8d7da;
      color: #721c24;
    }

    .vehicle-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 12px;
      margin-top: 8px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-label {
      color: #7f8c8d;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      color: #2c3e50;
      font-weight: 600;
      font-size: 13px;
    }

    .vehicle-details {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e0e6ed;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .detail-label {
      color: #7f8c8d;
    }

    .detail-value {
      color: #2c3e50;
      font-weight: 600;
    }

    .status-bar {
      padding: 12px 16px;
      background: #f8f9fb;
      border-bottom: 1px solid #e0e6ed;
      font-size: 12px;
      color: #7f8c8d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #27ae60;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .last-update {
      font-size: 11px;
      color: #95a5a6;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #7f8c8d;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state-text {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #667eea;
      font-size: 13px;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #e0e6ed;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 400;
    }

    .map-control-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #667eea;
      transition: all 0.2s ease;
      border-bottom: 1px solid #e0e6ed;
    }

    .map-control-btn:last-child {
      border-bottom: none;
    }

    .map-control-btn:hover {
      background: #f8f9fb;
    }

    .connection-status {
      position: absolute;
      top: 16px;
      left: 16px;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-size: 12px;
      font-weight: 600;
      z-index: 400;
    }

    .connection-live {
      color: #28a745;
    }

    .connection-error {
      color: #dc3545;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 40%;
        border-left: none;
        border-top: 1px solid #e0e6ed;
      }

      .map-container {
        height: 60%;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">TransitPulse</a>
    <div class="navbar-links">
      <a href="index.html" class="navbar-link">Home</a>
      <a href="dashboard.html" class="navbar-link">Dashboard</a>
      <a href="live-map.html" class="navbar-link">Live Map</a>
      <a href="realtime-map.html" class="navbar-link active">Real-Time</a>
      <a href="vehicle-detail.html" class="navbar-link">Vehicles</a>
      <a href="admin.html" class="navbar-link" id="admin-nav-link" style="display: none;">Admin</a>
    </div>
    <div class="navbar-actions">
      <a href="driver.html" class="navbar-btn navbar-btn-primary">Driver App</a>
    </div>
  </nav>

  <div class="container">
    <div class="map-container">
      <div id="map"></div>
      
      <div class="connection-status" id="connectionStatus">
        <span class="connection-live">● Connected</span>
      </div>

      <div class="map-controls">
        <button class="map-control-btn" title="Zoom In" onclick="map.zoomIn()">+</button>
        <button class="map-control-btn" title="Zoom Out" onclick="map.zoomOut()">−</button>
        <button class="map-control-btn" title="Center Map" onclick="centerMap()">⊙</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Real-Time Vehicles</h2>
        <p id="vehicle-count">Waiting for GPS data...</p>
      </div>

      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Live GPS Updates</span>
        </div>
        <div class="last-update" id="last-update">Waiting...</div>
      </div>

      <div class="sidebar-content">
        <div id="vehicle-list" class="vehicle-list">
          <div class="empty-state">
            <div class="empty-state-icon">🚌</div>
            <div class="empty-state-text">No vehicles tracking</div>
            <div class="loading">
              <div class="spinner"></div>
              <span>Waiting for GPS data...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // Map initialization
    let map;
    let vehicleMarkers = new Map();
    let routePolylines = new Map();
    let selectedVehicleId = null;
    let ws = null;
    let lastUpdateTime = Date.now();
    let vehicles = new Map();

    const API_BASE = 'http://localhost:3000/api';
    const WS_URL = 'ws://localhost:3000';

    // Initialize map
    function initMap() {
      map = L.map('map').setView([40.7580, -73.9855], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
      }).addTo(map);
    }

    // Center map on all vehicles
    function centerMap() {
      if (vehicleMarkers.size === 0) {
        map.setView([40.7580, -73.9855], 12);
        return;
      }

      const group = new L.featureGroup(Array.from(vehicleMarkers.values()));
      map.fitBounds(group.getBounds(), { padding: [50, 50] });
    }

    // Connect to WebSocket for real-time updates
    function connectWebSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('WebSocket connected');
        updateConnectionStatus(true);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'vehicle_update') {
            updateVehicleOnMap(data.vehicle);
            updateVehicleInList(data.vehicle);
            lastUpdateTime = Date.now();
            updateLastUpdateTime();
          }
        } catch (err) {
          console.error('WebSocket message error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        updateConnectionStatus(false);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected');
        updateConnectionStatus(false);
        // Reconnect after 3 seconds
        setTimeout(connectWebSocket, 3000);
      };
    }

    // Update connection status
    function updateConnectionStatus(connected) {
      const status = document.getElementById('connectionStatus');
      if (connected) {
        status.innerHTML = '<span class="connection-live">● Connected</span>';
      } else {
        status.innerHTML = '<span class="connection-error">● Disconnected</span>';
      }
    }

    // Fetch and display routes
    async function loadRoutes() {
      try {
        const response = await fetch(`${API_BASE}/routes`);
        const routes = await response.json();

        for (const route of routes) {
          displayRoute(route);
        }
      } catch (err) {
        console.error('Error loading routes:', err);
      }
    }

    // Display route polyline on map
    function displayRoute(route) {
      if (routePolylines.has(route.id)) return;

      const polyline = L.polyline(
        route.polyline.map((coord) => [coord[1], coord[0]]),
        {
          color: route.color || '#667eea',
          weight: 3,
          opacity: 0.6,
          dashArray: '5, 5',
        }
      ).addTo(map);

      routePolylines.set(route.id, polyline);

      // Add stop markers
      if (route.stops) {
        for (const stop of route.stops) {
          L.circleMarker([stop.latitude, stop.longitude], {
            radius: 6,
            fillColor: '#fff',
            color: route.color || '#667eea',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8,
          })
            .bindPopup(`<strong>${stop.name}</strong>`)
            .addTo(map);
        }
      }
    }

    // Update vehicle marker on map
    function updateVehicleOnMap(vehicle) {
      const key = vehicle.vehicle_id;

      if (!vehicleMarkers.has(key)) {
        // Create new marker
        const marker = L.marker([vehicle.latitude, vehicle.longitude], {
          icon: createVehicleIcon(vehicle.heading, vehicle.status),
        })
          .bindPopup(
            `<strong>${vehicle.vehicle_id}</strong><br/>
           Route: ${vehicle.route_id}<br/>
           Speed: ${vehicle.speed.toFixed(1)} m/s<br/>
           Driver: ${vehicle.driver_name || 'Unknown'}<br/>
           Next Stop: ${vehicle.next_stop_name || 'N/A'}<br/>
           ETA: ${formatETA(vehicle.eta_seconds)}`
          )
          .addTo(map);

        vehicleMarkers.set(key, marker);
      } else {
        // Update existing marker
        const marker = vehicleMarkers.get(key);
        marker.setLatLng([vehicle.latitude, vehicle.longitude]);
        marker.setIcon(createVehicleIcon(vehicle.heading, vehicle.status));
        
        // Update popup content
        marker.setPopupContent(
          `<strong>${vehicle.vehicle_id}</strong><br/>
           Route: ${vehicle.route_id}<br/>
           Speed: ${vehicle.speed.toFixed(1)} m/s<br/>
           Driver: ${vehicle.driver_name || 'Unknown'}<br/>
           Next Stop: ${vehicle.next_stop_name || 'N/A'}<br/>
           ETA: ${formatETA(vehicle.eta_seconds)}`
        );
      }

      // Store vehicle data
      vehicles.set(key, vehicle);
    }

    // Create vehicle icon with heading and status
    function createVehicleIcon(heading, status) {
      let color = '#667eea';
      if (status === 'delayed') color = '#ffc107';
      if (status === 'offline') color = '#dc3545';

      const svg = `
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <g transform="rotate(${heading || 0} 16 16)">
            <path d="M16 2 L28 28 L16 24 L4 28 Z" fill="${color}" stroke="white" stroke-width="2"/>
          </g>
        </svg>
      `;

      return L.icon({
        iconUrl: 'data:image/svg+xml;base64,' + btoa(svg),
        iconSize: [32, 32],
        iconAnchor: [16, 16],
      });
    }

    // Update vehicle in sidebar list
    function updateVehicleInList(vehicle) {
      let card = document.querySelector(`[data-vehicle-id="${vehicle.vehicle_id}"]`);

      if (!card) {
        card = createVehicleCard(vehicle);
        const vehicleList = document.getElementById('vehicle-list');
        
        // Remove empty state if it exists
        const emptyState = vehicleList.querySelector('.empty-state');
        if (emptyState) {
          emptyState.remove();
        }
        
        vehicleList.appendChild(card);
      }

      // Update card content
      updateVehicleCardContent(card, vehicle);
      updateVehicleCount();
    }

    // Create vehicle card
    function createVehicleCard(vehicle) {
      const card = document.createElement('div');
      card.className = 'vehicle-card';
      card.setAttribute('data-vehicle-id', vehicle.vehicle_id);
      card.onclick = () => selectVehicle(vehicle.vehicle_id);

      card.innerHTML = `
        <div class="vehicle-header">
          <div class="vehicle-name">${vehicle.vehicle_id}</div>
          <div class="vehicle-status status-${vehicle.status || 'live'}">${vehicle.status || 'Live'}</div>
        </div>
        <div class="vehicle-info">
          <div class="info-item">
            <div class="info-label">Speed</div>
            <div class="info-value" data-field="speed">${vehicle.speed.toFixed(1)} m/s</div>
          </div>
          <div class="info-item">
            <div class="info-label">ETA</div>
            <div class="info-value" data-field="eta">${formatETA(vehicle.eta_seconds)}</div>
          </div>
        </div>
        <div class="vehicle-details">
          <div class="detail-row">
            <span class="detail-label">Route</span>
            <span class="detail-value">${vehicle.route_id}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Driver</span>
            <span class="detail-value">${vehicle.driver_name || 'Unknown'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Next Stop</span>
            <span class="detail-value" data-field="next-stop">${vehicle.next_stop_name || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Accuracy</span>
            <span class="detail-value">±${vehicle.accuracy?.toFixed(0) || 0}m</span>
          </div>
        </div>
      `;

      return card;
    }

    // Update vehicle card content
    function updateVehicleCardContent(card, vehicle) {
      const statusEl = card.querySelector('.vehicle-status');
      statusEl.textContent = vehicle.status || 'Live';
      statusEl.className = `vehicle-status status-${vehicle.status || 'live'}`;

      const speedEl = card.querySelector('[data-field="speed"]');
      if (speedEl) speedEl.textContent = vehicle.speed.toFixed(1) + ' m/s';

      const etaEl = card.querySelector('[data-field="eta"]');
      if (etaEl) etaEl.textContent = formatETA(vehicle.eta_seconds);

      const nextStopEl = card.querySelector('[data-field="next-stop"]');
      if (nextStopEl) nextStopEl.textContent = vehicle.next_stop_name || 'N/A';
    }

    // Select vehicle
    function selectVehicle(vehicleId) {
      document.querySelectorAll('.vehicle-card').forEach((card) => {
        card.classList.remove('active');
      });

      const card = document.querySelector(`[data-vehicle-id="${vehicleId}"]`);
      if (card) card.classList.add('active');

      selectedVehicleId = vehicleId;
      const marker = vehicleMarkers.get(vehicleId);
      if (marker) {
        map.setView(marker.getLatLng(), 15);
        marker.openPopup();
      }
    }

    // Format ETA
    function formatETA(seconds) {
      if (!seconds || seconds <= 0) return 'N/A';
      const mins = Math.floor(seconds / 60);
      if (mins < 1) return '< 1 min';
      return mins + ' min';
    }

    // Update vehicle count
    function updateVehicleCount() {
      const count = vehicles.size;
      document.getElementById('vehicle-count').textContent = 
        `${count} vehicle${count !== 1 ? 's' : ''} tracking`;
    }

    // Update last update time
    function updateLastUpdateTime() {
      const now = Date.now();
      const diff = Math.floor((now - lastUpdateTime) / 1000);

      let text = 'Just now';
      if (diff >= 60) {
        text = Math.floor(diff / 60) + 'm ago';
      } else if (diff >= 5) {
        text = diff + 's ago';
      }

      document.getElementById('last-update').textContent = text;
    }

    // Initialize on page load
    window.addEventListener('load', () => {
      initMap();
      loadRoutes();
      connectWebSocket();

      // Update last update time every second
      setInterval(updateLastUpdateTime, 1000);

      // Fetch initial vehicle data
      fetchVehicles();
    });

    // Fetch vehicles from API
    async function fetchVehicles() {
      try {
        const response = await fetch(`${API_BASE}/gps/vehicles`);
        const data = await response.json();

        if (data.vehicles && data.vehicles.length > 0) {
          for (const vehicle of data.vehicles) {
            updateVehicleOnMap(vehicle);
            updateVehicleInList(vehicle);
          }
          lastUpdateTime = Date.now();
        }
      } catch (err) {
        console.error('Error fetching vehicles:', err);
      }
    }
  </script>

  <script>
    // Check if user has admin access and show admin link
    async function checkAdminAccess() {
      try {
        const response = await fetch('http://localhost:3000/api/admin/check-auth', {
          method: 'GET',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const data = await response.json();
          if (data.success && data.authenticated) {
            // Show admin link
            const adminLink = document.getElementById('admin-nav-link');
            if (adminLink) {
              adminLink.style.display = 'inline';
            }
          }
        }
      } catch (error) {
        // Silently fail - admin link stays hidden
        console.debug('Admin access check failed:', error);
      }
    }

    // Check admin access on page load
    document.addEventListener('DOMContentLoaded', checkAdminAccess);
  </script>
</body>
</html>
